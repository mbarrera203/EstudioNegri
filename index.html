<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LogoJPLimpio.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudio Negri</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Static hidden Netlify form so Netlify detects the form at build-time -->
    <form name="contacto" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contacto" />
      <input type="hidden" name="bot-field" />
      <input name="nombre" />
      <input name="telefono" />
      <input name="email" />
      <input name="tipo" />
      <textarea name="mensaje"></textarea>
    </form>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
